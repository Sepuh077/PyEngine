name: Build wheels

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      build_all:
        description: "Build for all Python versions and platforms (slow)"
        required: false
        default: "false"
        type: boolean

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - ubuntu-24.04-arm
          - windows-latest
          - macos-latest          # Apple Silicon (arm64)
          - macos-13              # Intel (x86_64)

    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      # cibuildwheel needs a Python to run itself
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install cibuildwheel
        run: python -m pip install cibuildwheel

      - name: Build wheels
        uses: pypa/cibuildwheel@v2.23.2
        env:
          # Build CPython 3.8 through 3.12 (match your declared support)
          CIBW_BUILD: "cp38-* cp39-* cp310-* cp311-* cp312-*"
          # Skip PyPy and musllinux for now (add later if you need them)
          CIBW_SKIP: "pp* *-musllinux*"
          # Useful for debugging build issues
          CIBW_BUILD_VERBOSITY: "1"

      - name: Upload wheels as artifacts
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: ./wheelhouse/*.whl
          if-no-files-found: error
          retention-days: 30

  # Optional: also build a source distribution (sdist)
  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Build sdist
        run: |
          python -m pip install build
          python -m build --sdist
      - uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  # This job uploads to PyPI when you push a version tag (recommended)
  # Uses Trusted Publishing (no secrets needed if configured on PyPI)
  upload_pypi:
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    # Only run on tagged releases
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/')
    permissions:
      id-token: write   # IMPORTANT for Trusted Publishing
      contents: read
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: wheels-*
          path: dist
          merge-multiple: true
      - uses: actions/download-artifact@v4
        with:
          name: sdist
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # To test first, change to TestPyPI:
        # with:
        #   repository-url: https://test.pypi.org/legacy/
